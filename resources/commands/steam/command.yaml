# Без AutoHotkey: открытие Big Picture и закрытие Steam через PowerShell (нужен установленный Steam).
list:
- command:
    action: cli
    cli_cmd: powershell
    cli_args:
    - -NoProfile
    - -WindowStyle
    - Hidden
    - -Command
    - "Start-Process 'steam://open/bigpicture'"
  voice:
    sounds:
    - game_mode
  phrases:
  - включи игровой режим
  - запусти игровой режим
  - запустить игровой режим
  - перейди в игровой режим
  - я хочу поиграть
  - включи стим
  - запусти стим
  - открой стим

- command:
    action: cli
    cli_cmd: powershell
    cli_args:
    - -NoProfile
    - -WindowStyle
    - Hidden
    - -Command
    - "Get-Process steam -ErrorAction SilentlyContinue | Stop-Process -Force"
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
    - ok4
  phrases:
  - рабочий режим
  - вернись в рабочий режим
  - отключи игровой режим
  - выйди из игрового режима
  - выход с игрового режима
  - рабочее пространство
  - выключи игровой режим
  - выключи стим
  - отключи стим
  - выйди из стима
  - закрой стим
